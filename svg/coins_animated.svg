  <style>
    .c1 { animation: drop 2s cubic-bezier(.22,.61,.36,1) infinite; animation-delay: 0s; }
    .c2 { animation: drop 2s cubic-bezier(.22,.61,.36,1) infinite; animation-delay: .18s; }
    .c3 { animation: drop 2s cubic-bezier(.22,.61,.36,1) infinite; animation-delay: .34s; }
    .c4 { animation: drop 2s cubic-bezier(.22,.61,.36,1) infinite; animation-delay: .5s; }

    @keyframes drop {
      0%          { transform: translateY(-160px); opacity: 0; }
      12%         { opacity: 1; }
      38%         { transform: translateY(10px);   opacity: 1; }
      46%         { transform: translateY(-5px);   opacity: 1; }
      52%         { transform: translateY(2px);    opacity: 1; }
      58%, 78%    { transform: translateY(0);      opacity: 1; }
      92%         { transform: translateY(0);      opacity: 0; }
      100%        { transform: translateY(-160px); opacity: 0; }
    }
  </style>

