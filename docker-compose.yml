services:
  gameparty:
    image: gomaaz/gameparty:latest   # pulled from Docker Hub automatically
    # image: gameparty:local         # uncomment + run "docker build -t gameparty:local ." for local dev
    container_name: gameparty
    ports:
      - "3000:3000"
    volumes:
      # SQLite database — persists across restarts and updates
      - gameparty-data:/data
    environment:
      - PORT=3000
      - DB_PATH=/data/gameparty.db
      - NODE_ENV=production
      - TZ=Europe/Berlin
      # Initial admin account (only used when the database is empty)
      - SEED_ADMIN_NAME=admin
      - SEED_ADMIN_PIN=1234
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  gameparty-data:
    driver: local
