<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gameparty</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/i18n.js"></script>
    <script src="js/icons.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F3AE;</text></svg>">
</head>
<body>

    <!-- Header -->
    <header class="app-header">
        <div class="app-logo">
            <span class="coin-icon">&#x1F3AE;</span>
            <span>Gameparty</span>
        </div>
        <div class="header-player">
            <div class="leaderboard-coins" style="display:none">
                <span id="header-coins">0</span>
                <img src="svg/coins.svg" class="coin-svg-icon" alt="coins">
            </div>
            <div class="header-stars-display" id="header-stars-display" style="display:none">
                <img src="svg/console-controller.svg" class="controller-svg-icon" alt="controller">
                <span id="header-stars">0</span>
            </div>
            <button class="notif-bell-btn" id="notif-bell-btn" style="display:none">🔔<span class="notif-badge" id="notif-badge" style="display:none">0</span></button>
            <button class="admin-gear-btn" id="admin-gear-btn" style="display:none" title="Admin Settings">&#x2699;&#xFE0F;</button>
            <button class="player-select-btn" id="header-player-btn">Log In</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div id="view-dashboard" class="view active"></div>
        <div id="view-matcher" class="view"></div>
        <div id="view-profile" class="view"></div>
        <div id="view-session" class="view"></div>
        <div id="view-shop" class="view"></div>
        <div id="view-challenges" class="view"></div>
        <div id="view-activities" class="view"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="nav-bar">
        <button class="nav-item active" data-view="dashboard">
            <span class="nav-icon">&#x1F3E0;</span>
            <span>Home</span>
        </button>
        <button class="nav-item" data-view="matcher">
            <span class="nav-icon">&#x1F3AE;</span>
            <span>Games</span>
        </button>
        <button class="nav-item" data-view="challenges">
            <span class="nav-icon">&#x2694;&#xFE0F;</span>
            <span>Duels</span>
        </button>
        <button class="nav-item" data-view="shop">
            <span class="nav-icon">&#x1F6D2;</span>
            <span>Shop</span>
        </button>
        <button class="nav-item" data-view="profile">
            <span class="nav-icon">&#x1F465;</span>
            <span>Ich</span>
        </button>
    </nav>

    <!-- Toast Container -->
    <div class="toast-container"></div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal"></div>
    </div>

    <!-- Notification Panel -->
    <div class="notif-panel" id="notif-panel"></div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="admin-panel"></div>
    <div class="admin-panel-backdrop" id="admin-panel-backdrop"></div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
